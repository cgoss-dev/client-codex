<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Client Codex</title>

    <!-- Bootstrap provides the grid, components, and utility classes. -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Our stylesheet loads second so we can customize Bootstrap. -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <header>
      <nav class="navbar navbar-expand-md app-header py-2" data-bs-theme="dark" aria-label="Primary navigation">
        <div class="container-fluid px-0">
          <a class="navbar-brand fs-3 fw-bold" href="#">Client Codex</a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#primaryNavigation"
            aria-controls="primaryNavigation"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="primaryNavigation">
            <ul class="navbar-nav nav nav-pills app-nav ms-md-auto gap-2 py-3 py-md-0">
              <li class="nav-item">
                <a class="nav-link btn btn-light active" href="#" aria-current="page">Schedule</a>
              </li>
              <li class="nav-item">
                <a class="nav-link btn btn-light" href="#">Clients</a>
              </li>
              <li class="nav-item">
                <a class="nav-link btn btn-light" href="#">Billing</a>
              </li>
              <li class="nav-item">
                <a class="nav-link btn btn-light" href="#">Company</a>
              </li>
              <li class="nav-item">
                <a class="nav-link btn btn-light" href="#">Settings</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container-fluid d-flex flex-grow-1">
      <div class="row">
        <aside class="offcanvas-md offcanvas-start col-md-auto app-sidebar px-0" tabindex="-1" id="scheduleSidebar" aria-label="Sidebar">
          <button
            class="btn app-sidebar-handle app-sidebar-close d-md-none shadow-sm"
            type="button"
            data-bs-dismiss="offcanvas"
            data-bs-target="#scheduleSidebar"
            aria-label="Close sidebar"
          >
            <span aria-hidden="true">&lsaquo;</span>
          </button>

          <div class="offcanvas-body d-block app-sidebar-content px-2">
            <section class="app-sidebar-section" aria-labelledby="calendar-heading">
              <h2 id="calendar-heading" class="h5 app-sidebar-title text-center">Calendar</h2>

              <div class="card calendar-card app-sidebar-card font-monospace">
                <div class="card-body calendar-body px-1">
                  <div class="btn-group w-100" role="group" aria-label="Calendar month navigation">
                    <button class="btn btn-light calendar-month-button" id="previousMonthButton" type="button" aria-label="Previous month">&lsaquo;</button>

                    <button class="btn btn-light calendar-month-reset flex-grow-1" id="currentMonthButton" type="button" aria-label="Return to current month">
                      <time id="calendarMonth" datetime="" aria-live="polite"></time>
                    </button>

                    <button class="btn btn-light calendar-month-button" id="nextMonthButton" type="button" aria-label="Next month">&rsaquo;</button>
                  </div>

                  <button
                    class="calendar-weekdays btn-light text-center"
                    id="weekStartToggle"
                    type="button"
                    aria-label="Week starts on Sunday. Change to Monday."
                    aria-pressed="false"
                  >
                    <span class="calendar-weekend" aria-hidden="true">Sun</span>
                    <span aria-hidden="true">Mon</span>
                    <span aria-hidden="true">Tue</span>
                    <span aria-hidden="true">Wed</span>
                    <span aria-hidden="true">Thu</span>
                    <span aria-hidden="true">Fri</span>
                    <span class="calendar-weekend" aria-hidden="true">Sat</span>
                  </button>

                  <div class="calendar-dates"></div>
                </div>
              </div>
            </section>

            <section class="app-sidebar-section" aria-labelledby="technicians-heading">
              <h2 id="technicians-heading" class="h5 app-sidebar-title text-center">Technicians</h2>

              <div class="card app-sidebar-card">
                <div class="card-body d-grid gap-2 p-2" role="group" aria-label="Filter schedule by technician">
                  <button class="btn btn-light technician-button" type="button" aria-pressed="false">Tech 1</button>
                  <button class="btn btn-light technician-button active" type="button" aria-pressed="true">Tech 2</button>
                  <button class="btn btn-light technician-button" type="button" aria-pressed="false">Tech 3</button>
                  <button class="btn btn-light technician-button" type="button" aria-pressed="false">Tech 4</button>
                  <button class="btn btn-light technician-button" type="button" aria-pressed="false">Tech 5</button>
                </div>
              </div>
            </section>

            <section class="app-sidebar-section" aria-labelledby="map-heading">
              <h2 id="map-heading" class="h5 app-sidebar-title text-center">Map</h2>

              <img
                class="img-fluid app-sidebar-card"
                src="images/mini-map-placeholder.png"
                alt="Map showing example technician locations"
              />
            </section>
          </div>
        </aside>

        <section class="col-12 col-md app-workspace">
          <button
            class="btn btn-primary app-sidebar-handle app-sidebar-toggle d-md-none shadow-sm"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#scheduleSidebar"
            aria-controls="scheduleSidebar"
            aria-label="Open sidebar"
          >
            <span aria-hidden="true">&rsaquo;</span>
          </button>

          <h1 class="h5">Schedule</h1>
          <p class="mb-0">The weekly schedule will go here.</p>
        </section>
      </div>
    </main>

    <!-- Bootstrap JavaScript powers responsive navigation and the sidebar. -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="js/app.js"></script>
  </body>
</html>
